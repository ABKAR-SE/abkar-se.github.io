<!DOCTYPE html>
<html lang="it"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Valley — Arbetsschema &amp; Lön 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  --bg:#050a14;--surface:#0a1628;--surface2:#0f1f3d;--border:#1a3a6e;
  --text:#e0f0ff;--muted:#6a8aaa;--cyan:#00e5ff;--green:#39ff14;
  --input-bg:#070e1a;--input-border:#1a3a6e;--input-color:#00e5ff;
  --row-hover:#0a1e3a;--row-weekend-color:#6a8aaa;--today-bg:#001a2e;
  --thead-bg:#07101f;--tfoot-bg:#0f1f3d;--header-bg:#0a1628;
  --controls-bg:#07101f;--tab-inactive:#07101f;--tab-active:#0a1628;
  --scard-bg:#0a1628;--export-bg:#0f1f3d;
  --note-color:#a0b8d0;--acc-color:#e0a060;--paga-color:#a0c0e0;
  background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;
}
body.light{
  --bg:#f4f6fa;--surface:#ffffff;--surface2:#e8eef8;--border:#c0cde0;
  --text:#1a2a3a;--muted:#7a8fa8;--cyan:#0066cc;--green:#1a7a00;
  --input-bg:#ffffff;--input-border:#b0c0d8;--input-color:#0055aa;
  --row-hover:#e8f0fa;--row-weekend-color:#9aabbf;--today-bg:#e0f0ff;
  --thead-bg:#e0e8f4;--tfoot-bg:#d8e4f4;--header-bg:#1a3a6e;
  --controls-bg:#eef2f8;--tab-inactive:#dde6f4;--tab-active:#ffffff;
  --scard-bg:#ffffff;--export-bg:#1a3a6e;
  --note-color:#5a7090;--acc-color:#a05a00;--paga-color:#405a80;
  background:var(--bg);color:var(--text);
}
body.light .logo-text{color:#ffffff}
body.light .logo-sub{color:#a0c0e0}
body.light .badge{background:#0f2a5e;border-color:#0055aa44;color:#ffffff}
body.light .tab{color:#5a7090}
body.light .tab.active{color:#0055aa;border-color:#0066cc55}
body.light .export-btn{background:#1a3a6e;color:#ffffff;border-color:#0055aa}
body.light .export-btn:hover{background:#0f2a5e}
body.light .theme-toggle{background:#e8eef8;border-color:#b0c0d8;color:#1a2a3a}
body.light .month-title{color:#0055aa}
body.light .mstat span{color:#1a7a00}
body.light td.computed{color:#1a7a00}
body.light td.total-dovuto{color:#0055aa}
body.light .tfoot-row td.sum-ore{color:#1a7a00}
body.light .tfoot-row td.sum-tot{color:#0055aa}
body.light .scard-name{color:#0055aa}
body.light .scard-val{color:#1a7a00}
body.light .scard-val.blue{color:#0055aa}
body.light .netto-fill{background:linear-gradient(90deg,#0066cc,#1a7a00)}
body.light tbody tr:hover{background:var(--row-hover)}

.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:16px}
.logo-text{font-family:'Orbitron',sans-serif;font-weight:900;font-size:18px;color:var(--cyan);letter-spacing:3px}
.logo-sub{font-family:'Exo 2',sans-serif;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.badge{background:var(--surface2);border:1px solid #00e5ff22;color:var(--cyan);font-size:10px;font-family:'Orbitron',sans-serif;padding:3px 10px;border-radius:2px;letter-spacing:1px}
.theme-toggle-wrap{margin-left:auto;display:flex;align-items:center;gap:10px}
.theme-toggle{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:6px 14px;border-radius:2px;cursor:pointer;transition:all .2s;user-select:none}
.theme-toggle:hover{border-color:var(--cyan);color:var(--text)}
.toggle-dot{width:28px;height:14px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;position:relative;transition:background .2s}
.toggle-dot::after{content:'';position:absolute;top:2px;left:2px;width:9px;height:9px;border-radius:50%;background:var(--muted);transition:all .2s}
body:not(.light) .toggle-dot{background:var(--cyan)22;border-color:var(--cyan)55}
body:not(.light) .toggle-dot::after{background:var(--cyan);left:15px}

.controls{display:flex;gap:10px;padding:14px 24px;background:var(--controls-bg);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.ctrl-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
select,input[type=number],input[type=text],input[type=time]{background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;padding:6px 12px;border-radius:3px;outline:none;cursor:pointer}
select:focus,input:focus{border-color:var(--cyan)55}

.tab-bar{display:flex;gap:2px;padding:12px 24px 0;background:var(--bg);flex-wrap:wrap}
.tab{padding:8px 20px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;border:1px solid var(--border);border-bottom:none;background:var(--tab-inactive);color:var(--muted);transition:all .2s;border-radius:3px 3px 0 0}
.tab.active{background:var(--tab-active);color:var(--cyan);border-color:var(--cyan)55}
.tab:hover:not(.active){color:var(--text);background:var(--surface)}

.content{padding:20px 24px}
.month-block{margin-bottom:28px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.month-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.month-title{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;color:var(--cyan)}
.month-stats{display:flex;gap:20px}
.mstat{font-size:11px;color:var(--muted)}
.mstat span{color:var(--green);font-weight:600}

table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--thead-bg);color:var(--muted);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:7px 8px;text-align:center;border-bottom:1px solid var(--border);font-weight:400}
tbody tr{border-bottom:1px solid var(--surface2);transition:background .15s}
tbody tr:hover{background:var(--row-hover)}
tbody tr.weekend td{color:var(--row-weekend-color)}
tbody tr.today td{background:var(--today-bg)}
td{padding:5px 8px;text-align:center;vertical-align:middle}
td.day-name{text-align:left;color:var(--muted);font-size:11px;min-width:80px}
td.day-name.workday{color:var(--text)}
td input[type=time],td input[type=number],td input[type=text]{background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-color);font-family:'Exo 2',sans-serif;font-size:12px;padding:3px 6px;width:100%;text-align:center;border-radius:2px;outline:none}
td input:focus{border-color:var(--cyan);background:var(--surface)}
td input[type=number].paga{color:var(--paga-color)}
td input[type=number].acc{color:var(--acc-color)}
td.computed{color:var(--green);font-weight:600;font-size:12px}
td.total-dovuto{color:var(--cyan);font-weight:600}
td.note-cell input{text-align:left;color:var(--note-color);font-size:11px}
.tfoot-row td{background:var(--tfoot-bg);color:var(--text);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;padding:8px;border-top:1px solid var(--border)}
.tfoot-row td.sum-ore{color:var(--green);font-weight:700}
.tfoot-row td.sum-tot{color:var(--cyan);font-weight:700}

.summary-panel{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:24px}
.scard{background:var(--scard-bg);border:1px solid var(--border);border-radius:4px;padding:16px 20px}
.scard-name{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--cyan);letter-spacing:2px;margin-bottom:12px}
.scard-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--surface2);font-size:12px}
.scard-row:last-child{border-bottom:none}
.scard-label{color:var(--muted)}
.scard-val{color:var(--green);font-weight:600;font-family:'Orbitron',sans-serif;font-size:11px}
.scard-val.blue{color:var(--cyan)}
.netto-bar{margin-top:12px;height:3px;background:var(--border);border-radius:2px}
.netto-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:2px;transition:width .5s}

.footer-bar{background:var(--controls-bg);border-top:1px solid var(--border);padding:8px 24px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);font-family:'Orbitron',sans-serif;letter-spacing:1px}
.export-btn{background:var(--export-bg);border:1px solid var(--cyan)44;color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:6px 14px;border-radius:2px;cursor:pointer;transition:all .2s}
.export-btn:hover{background:var(--cyan)11;border-color:var(--cyan)}

@media print{
  .controls,.tab-bar,.footer-bar,.theme-toggle-wrap,.export-btn{display:none!important}
  body{background:#fff!important;color:#000!important}
  .month-block{border:1px solid #ccc!important;break-inside:avoid}
  .month-header{background:#e8eef8!important}
  .month-title{color:#003399!important}
  thead th{background:#e0e8f4!important;color:#444!important}
  td.computed{color:#007700!important}
  td.total-dovuto{color:#003399!important}
  .tfoot-row td{background:#d8e4f4!important}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-text">⬡ ATLAS VALLEY</div>
    <div class="logo-sub">Arbetsschema &amp; Lön — År 2026</div>
  </div>
  <div class="theme-toggle-wrap">
    <span class="badge">APS</span>
    <span class="badge">VERONA</span>
    <div class="theme-toggle" onclick="toggleTheme()" title="Cambia tema">
      <span id="themeLabel">SCURO</span>
      <div class="toggle-dot" id="toggleDot"></div>
    </div>
  </div>
</div>

<div class="controls">
  <span class="ctrl-label">Persona 1:</span>
  <span style="font-family:'Orbitron',sans-serif;font-size:13px;color:var(--cyan);letter-spacing:2px;padding:6px 4px">OUSSAMA</span>
  <span class="ctrl-label" style="margin-left:12px">Vista:</span>
  <select id="viewSel" onchange="render()">
    <option value="month" selected>Mensile</option>
    <option value="summary">Riepilogo Annuale</option>
  </select>
  <span class="ctrl-label" style="margin-left:12px">Paga oraria default (€):</span>
  <input type="number" id="defPaga" value="7" min="0" step="0.5" style="width:70px" onchange="render()">
</div>

<div class="tab-bar" id="tabBar"></div>
<div class="content" id="mainContent"></div>

<div class="footer-bar">
  <span>ATLAS VALLEY APS · 2026 · <span style="color:var(--cyan)">pantheraleo-atlasvalley.github.io</span></span>
  <button class="export-btn" onclick="exportCSV()">↓ EXPORT CSV</button>
</div>

<script>
const MONTHS_SV=['JANUARI','FEBRUARI','MARS','APRIL','MAJ','JUNI','JULI','AUGUSTI','SEPTEMBER','OKTOBER','NOVEMBER','DECEMBER'];
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
// Only one employee now
const EMP_NAME = 'OUSSAMA';
const EMP_IDX = 0;

// Pre-load all known shift data for Oussama into data{}
// key format: empIdx_year_month_day
let data = {
  '0_2026_5_1':  {inizio:'13:30',fine:'17:30',pausa:'',paga:'7',acconto:'0',note:''},
  '0_2026_5_2':  {inizio:'08:30',fine:'10:30',pausa:'',paga:'7',acconto:'10',note:''},
  '0_2026_5_3':  {inizio:'10:00',fine:'16:30',pausa:'1',paga:'7',acconto:'0',note:''},
  '0_2026_5_4':  {inizio:'08:00',fine:'17:00',pausa:'1',paga:'7',acconto:'10',note:''},
  '0_2026_5_5':  {inizio:'07:30',fine:'13:00',pausa:'',paga:'7',acconto:'40',note:'fanale sx bak'},
  '0_2026_5_8':  {inizio:'08:30',fine:'18:30',pausa:'3.5',paga:'7',acconto:'10',note:'tanken först'},
  '0_2026_5_9':  {inizio:'08:00',fine:'16:00',pausa:'',paga:'7',acconto:'50',note:''},
  '0_2026_5_13': {inizio:'00:00',fine:'01:00',pausa:'1',paga:'7',acconto:'50',note:'moad -110'},
  '0_2026_5_14': {inizio:'08:00',fine:'16:00',pausa:'1',paga:'7',acconto:'0',note:'abbas'},
  '0_2026_5_15': {inizio:'08:00',fine:'19:00',pausa:'11',paga:'7',acconto:'0',note:'aina'},
  '0_2026_5_16': {inizio:'08:00',fine:'16:00',pausa:'1',paga:'7',acconto:'10',note:''},
  '0_2026_5_17': {inizio:'08:00',fine:'16:00',pausa:'1',paga:'7',acconto:'0',note:''},
  '0_2026_5_18': {inizio:'08:00',fine:'17:00',pausa:'1',paga:'7',acconto:'0',note:''},
  // Day 25: acconto 240
  '0_2026_5_25': {inizio:'',fine:'',pausa:'',paga:'7',acconto:'240',note:''},
};

let currentMonth = new Date().getMonth();
let isLight = false;

function toggleTheme(){
  isLight=!isLight;
  document.body.classList.toggle('light',isLight);
  document.getElementById('themeLabel').textContent=isLight?'CHIARO':'SCURO';
}

function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function getDow(y,m,d){return (new Date(y,m,d).getDay()+6)%7}

function calcOre(inizio,fine,pausa){
  if(!inizio||!fine) return null;
  const [h1,m1]=inizio.split(':').map(Number);
  const [h2,m2]=fine.split(':').map(Number);
  let ore=(h2*60+m2-h1*60-m1)/60;
  if(ore<0) ore+=24;
  ore-=(parseFloat(pausa)||0);
  return Math.max(0,Math.round(ore*100)/100);
}

function key(emp,y,m,d){return `${emp}_${y}_${m}_${d}`}
function getVal(k,field){return (data[k]&&data[k][field]!==undefined)?data[k][field]:''}
function setVal(k,field,val){if(!data[k])data[k]={};data[k][field]=val;refreshTotals()}

function refreshTotals(){
  const defPaga=parseFloat(document.getElementById('defPaga').value)||7;
  for(let m=0;m<12;m++){
    let totOre=0,totDov=0;
    const days=getDaysInMonth(2026,m);
    for(let d=1;d<=days;d++){
      const k=key(EMP_IDX,2026,m,d);
      const inizio=getVal(k,'inizio'),fine=getVal(k,'fine'),pausa=getVal(k,'pausa');
      const paga=parseFloat(getVal(k,'paga'))||defPaga;
      const acc=parseFloat(getVal(k,'acconto'))||0;
      const ore=calcOre(inizio,fine,pausa);
      const oreEl=document.getElementById(`ore_0_${m}_${d}`);
      const totEl=document.getElementById(`tot_0_${m}_${d}`);
      if(ore!==null){
        const tot=Math.round((ore*paga-acc)*100)/100;
        if(oreEl) oreEl.textContent=ore.toFixed(2);
        if(totEl) totEl.textContent='€'+tot.toFixed(2);
        totOre+=ore; totDov+=tot;
      } else {
        // Even if no hours, show acconto deduction if any
        const acc2=parseFloat(getVal(k,'acconto'))||0;
        if(acc2>0){
          if(oreEl) oreEl.textContent='—';
          if(totEl) totEl.textContent='€'+(-acc2).toFixed(2);
          totDov-=acc2;
        } else {
          if(oreEl) oreEl.textContent='—';
          if(totEl) totEl.textContent='—';
        }
      }
    }
    const sfOre=document.getElementById(`sf_ore_0_${m}`);
    const sfTot=document.getElementById(`sf_tot_0_${m}`);
    if(sfOre) sfOre.textContent=totOre.toFixed(2)+'h';
    if(sfTot) sfTot.textContent='€'+totDov.toFixed(2);
    const msOre=document.getElementById(`ms_ore_0_${m}`);
    const msTot=document.getElementById(`ms_tot_0_${m}`);
    if(msOre) msOre.innerHTML='<span>'+totOre.toFixed(1)+'h</span>';
    if(msTot) msTot.innerHTML='<span>€'+totDov.toFixed(2)+'</span>';
  }
}

function renderTabs(){
  const bar=document.getElementById('tabBar');
  const view=document.getElementById('viewSel').value;
  if(view!=='month'){bar.innerHTML='';return}
  bar.innerHTML=MONTHS_SV.map((mn,i)=>
    `<div class="tab${i===currentMonth?' active':''}" onclick="currentMonth=${i};renderTabs();renderMain()">${mn.substring(0,3)}</div>`
  ).join('');
}

function renderMain(){
  const view=document.getElementById('viewSel').value;
  const defPaga=parseFloat(document.getElementById('defPaga').value)||7;
  const content=document.getElementById('mainContent');
  if(view==='summary'){renderSummary(content,defPaga);return}
  const m=currentMonth;
  const days=getDaysInMonth(2026,m);
  let rows='';
  for(let d=1;d<=days;d++){
    const dow=getDow(2026,m,d);
    const k=key(EMP_IDX,2026,m,d);
    const isWe=dow>=5;
    const isToday=(new Date().getFullYear()===2026&&new Date().getMonth()===m&&new Date().getDate()===d);
    const inizio=getVal(k,'inizio'),fine=getVal(k,'fine');
    const pausa=getVal(k,'pausa');
    const paga=getVal(k,'paga')||defPaga;
    const acc=getVal(k,'acconto')||'0';
    const note=getVal(k,'note')||'';
    const ore=calcOre(inizio,fine,pausa);
    let tot='—';
    if(ore!==null){
      tot='€'+(ore*parseFloat(paga)-parseFloat(acc)).toFixed(2);
    } else if(parseFloat(acc)>0){
      tot='€'+(-parseFloat(acc)).toFixed(2);
    }
    rows+=`<tr class="${isWe?'weekend':''}${isToday?' today':''}">
      <td style="color:var(--muted);font-size:11px;padding-left:12px">${d.toString().padStart(2,'0')}</td>
      <td class="day-name${isWe?'':' workday'}">${DAYS_IT[dow]}</td>
      <td><input type="time" value="${inizio}" onchange="setVal('${k}','inizio',this.value);refreshTotals()"></td>
      <td><input type="time" value="${fine}" onchange="setVal('${k}','fine',this.value);refreshTotals()"></td>
      <td><input type="number" value="${pausa}" placeholder="0" min="0" step="0.25" style="width:55px" onchange="setVal('${k}','pausa',this.value);refreshTotals()"></td>
      <td class="computed" id="ore_0_${m}_${d}">${ore!==null?ore.toFixed(2):'—'}</td>
      <td><input type="number" class="paga" value="${paga}" min="0" step="0.5" style="width:60px" onchange="setVal('${k}','paga',this.value);refreshTotals()"></td>
      <td><input type="number" class="acc" value="${acc}" placeholder="0" min="0" step="1" style="width:60px" onchange="setVal('${k}','acconto',this.value);refreshTotals()"></td>
      <td class="total-dovuto" id="tot_0_${m}_${d}">${tot}</td>
      <td class="note-cell"><input type="text" value="${note}" placeholder="..." onchange="setVal('${k}','note',this.value)"></td>
    </tr>`;
  }
  content.innerHTML=`
  <div class="month-block">
    <div class="month-header">
      <div class="month-title">${MONTHS_SV[m]} 2026 — ${EMP_NAME}</div>
      <div class="month-stats">
        <div class="mstat">Ore: <span id="ms_ore_0_${m}"><span>0.0h</span></span></div>
        <div class="mstat">Totale: <span id="ms_tot_0_${m}"><span>€0.00</span></span></div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:32px">#</th>
        <th style="text-align:left">Giorno</th>
        <th>Inizio</th><th>Fine</th>
        <th>Pausa (h)</th><th>Ore</th>
        <th>Paga (€)</th><th>Acconto (€)</th>
        <th>Totale</th><th>Note</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="tfoot-row">
        <td colspan="5" style="text-align:right;color:var(--muted);font-size:9px">TOTALE ${MONTHS_SV[m]}</td>
        <td class="sum-ore" id="sf_ore_0_${m}">0.00h</td>
        <td></td><td></td>
        <td class="sum-tot" id="sf_tot_0_${m}">€0.00</td>
        <td></td>
      </tr></tfoot>
    </table>
  </div>`;
  refreshTotals();
}

function renderSummary(content,defPaga){
  let grandOre=0,grandDov=0,grandAcc=0;
  let rows='';
  for(let m=0;m<12;m++){
    let totOre=0,totAcc=0,totDov=0;
    const days=getDaysInMonth(2026,m);
    for(let d=1;d<=days;d++){
      const k=key(EMP_IDX,2026,m,d);
      const inizio=getVal(k,'inizio'),fine=getVal(k,'fine'),pausa=getVal(k,'pausa');
      const paga=parseFloat(getVal(k,'paga'))||defPaga;
      const acc=parseFloat(getVal(k,'acconto'))||0;
      const ore=calcOre(inizio,fine,pausa);
      if(ore!==null){totOre+=ore;totAcc+=acc;totDov+=ore*paga-acc;}
      else if(acc>0){totAcc+=acc;totDov-=acc;}
    }
    grandOre+=totOre;grandAcc+=totAcc;grandDov+=totDov;
    if(totOre>0||totAcc>0) rows+=`<div class="scard-row"><span class="scard-label">${MONTHS_IT[m]}</span><span class="scard-val blue">${totOre.toFixed(1)}h · €${totDov.toFixed(2)}</span></div>`;
  }
  if(!rows) rows='<div class="scard-row"><span class="scard-label" style="font-size:11px">Nessun dato inserito</span></div>';
  content.innerHTML=`<div class="summary-panel"><div class="scard">
    <div class="scard-name">${EMP_NAME}</div>
    ${rows}
    <div class="scard-row" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
      <span class="scard-label">Ore totali</span><span class="scard-val">${grandOre.toFixed(1)}h</span>
    </div>
    <div class="scard-row">
      <span class="scard-label">Acconti versati</span><span class="scard-val" style="color:var(--acc-color)">€${grandAcc.toFixed(2)}</span>
    </div>
    <div class="scard-row">
      <span class="scard-label">Totale dovuto</span><span class="scard-val blue">€${grandDov.toFixed(2)}</span>
    </div>
    <div class="netto-bar"><div class="netto-fill" style="width:${grandOre>0?Math.min(100,grandOre/500*100):0}%"></div></div>
  </div></div>
  <div style="color:var(--muted);font-size:11px;font-family:'Orbitron',sans-serif;letter-spacing:2px;text-align:center;padding:12px">
    SELEZIONA UN MESE DAL MENU PER INSERIRE I TURNI
  </div>`;
}

function exportCSV(){
  const defPaga=parseFloat(document.getElementById('defPaga').value)||7;
  let csv='Data,Giorno,Inizio,Fine,Pausa,Ore,Paga,Acconto,Totale,Note\n';
  for(let m=0;m<12;m++){
    const days=getDaysInMonth(2026,m);
    for(let d=1;d<=days;d++){
      const k=key(EMP_IDX,2026,m,d);
      const inizio=getVal(k,'inizio'),fine=getVal(k,'fine');
      const acc=parseFloat(getVal(k,'acconto'))||0;
      if(!inizio&&!fine&&acc===0) continue;
      const pausa=getVal(k,'pausa')||'0';
      const paga=parseFloat(getVal(k,'paga'))||defPaga;
      const ore=calcOre(inizio,fine,pausa)||0;
      const tot=(ore*paga-acc).toFixed(2);
      const dow=getDow(2026,m,d);
      const note=getVal(k,'note')||'';
      csv+=`${d.toString().padStart(2,'0')}/${(m+1).toString().padStart(2,'0')}/2026,${DAYS_IT[dow]},${inizio},${fine},${pausa},${ore.toFixed(2)},${paga},${acc},${tot},"${note}"\n`;
    }
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`AtlasValley_${EMP_NAME}_2026.csv`;
  a.click();
}

function render(){renderTabs();renderMain()}
render();
</script>
